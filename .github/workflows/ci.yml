name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A newer push on the same ref cancels the older in-flight run, so an older
# commit's deploy can never start after a newer one's (silent stale-deploy
# inversion) — and superseded PR runs stop burning minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=package-lock.json
      fail-on-vuln: true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build with Pages base
        run: npm run build
        env:
          EMG_BASE: /everything-must-go/
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Verify deployed site
        run: |
          status=$(curl -f -L --retry 6 --retry-delay 10 --retry-all-errors -o response.html -w '%{http_code}' "https://michael-denyer.github.io/everything-must-go/")
          echo "HTTP status: ${status}"
          test "${status}" = "200"
          grep '<title>Everything Must Go' response.html
